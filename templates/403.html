{% extends "layout.html" %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card shadow-lg border-0 rounded-4 p-5">
            <div class="display-1 text-danger mb-4">
                <i class="fas fa-lock"></i>
            </div>
            <h1 class="fw-bold text-dark mb-3">Access Denied: Admins Only</h1>
            <p class="text-muted fs-5 mb-4">You do not have the required permissions to access this page. Please contact the administrator if you believe this is an error.</p>
            <div class="d-grid gap-2 d-md-block">
                <a href="{{ url_for('main.index') }}" class="btn btn-primary px-4 py-2 rounded-3 me-md-2">
                    <i class="fas fa-home me-2"></i>Back to Dashboard
                </a>
                <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-secondary px-4 py-2 rounded-3">
                    <i class="fas fa-sign-out-alt me-2"></i>Logout
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
