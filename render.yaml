services:
  - type: web
    name: smart-parking-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smart-parking-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "0"
      - key: ADMIN_LOCAL_ONLY
        value: "0"

databases:
  - name: smart-parking-db
    databaseName: smart_parking
    user: smart_parking_user
