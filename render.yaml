services:
  - type: web
    name: smart-parking-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: FLASK_DEBUG
        value: "0"
      - key: ADMIN_LOCAL_ONLY
        value: "0"
